async function saveToInfinityFS(blob, filename) {
    try {
        // 1. Створюємо об'єкт File згідно з вашою вимогою
        const f = new File([blob], "downloads/" + filename, { type: blob.type });

        console.log("Download: "+ f)

        console.error("Помилка збереження у VFS:", err);

}


async function fetchWithFallback(targetUrl) {
    if (!targetUrl.includes("://")) return 0;
    const encodedUrl = encodeURIComponent(targetUrl);
    let lastError;

    // 1. Try all Proxies first
    for (let proxyTemplate of userProxies) {
        try {
            const finalUrl = proxyTemplate.replace("$url", encodedUrl);
            lockIcon.title = proxyTemplate.replace("$url", "");
            const res = await fetch(finalUrl);
            if (res.ok) return res;
        } catch (err) {
            lastError = err;
            console.warn(`Proxy ${proxyTemplate} failed`);
        }
    }

    // 2. Proxies failed, try DIRECT as a last resort
    console.log("All proxies failed. Attempting direct connection...");
    try {
        const directRes = await fetch(targetUrl);
        if (directRes.ok) return directRes;
    } catch (err) {
        lastError = err;
    }

    throw lastError || new Error("Всі методи (включаючи проксі та пряме підключення) недоступні");
}

const nativeSetItem = localStorage.setItem.bind(localStorage);
const nativeGetItem = localStorage.getItem.bind(localStorage);

let permissionState = {}; 

localStorage.setItem = function(key, value) {
  const host = new URL("${url}").hostname;

  // Системні ключі Infinity OS завжди доступні
  if (key === "allowedSites") {
    return nativeSetItem(key, value);
  }

  const allowed = JSON.parse(nativeGetItem("allowedSites") || "[]");

  // 1. Якщо вже в білому списку — записуємо миттєво
  if (allowed.includes(host)) {
    return nativeSetItem(key, value);
  }

  // 2. Якщо вже заборонено — мовчки ігноруємо (або кидаємо Error)
  if (permissionState[host] === "denied") {
    return; 
  }

  // 3. Якщо запиту ще не було — ініціюємо його
  if (permissionState[host] !== "pending") {
    permissionState[host] = "pending";

    // Викликаємо confirm асинхронно, не блокуючи цей потік
    (async () => {
      const allow = await parent.parent.confirm(
        host + " " + parent.parent._("allow_site")
      );

      if (allow) {
        permissionState[host] = "granted";
        const currentAllowed = JSON.parse(nativeGetItem("allowedSites") || "[]");
        if (!currentAllowed.includes(host)) {
          currentAllowed.push(host);
          nativeSetItem("allowedSites", JSON.stringify(currentAllowed));
        }
        // Після дозволу наступні виклики setItem спрацюють
      } else {
        permissionState[host] = "denied";
      }
    })();
  }

  // Поки чекаємо підтвердження — повертаємо undefined (стандарт setItem)
  // Дані цього конкретного виклику будуть втрачені, але сайт не "впаде"
};
