<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinity Store</title>
<link rel="stylesheet" href="global.css">

<style>
    body{user-select: none; overflow-x: hidden;}
.app-card {
    border-radius: 15px;
    padding: 10px;
    margin: 5px;
    cursor: pointer;
    border: solid 1px #aaa;
}

p, h2 {
    padding-left: 10px;
}

#apps-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
}

/* Carousel */
.slideshow-container {
  max-width: 600px;
  position: relative;
  margin: auto;
  min-height: 100px;
  box-sizing:border-box;
}

.mySlides {
  display: none;
    transition: transform 0.4s ease;
    height: 300px;
    z-index: 0;
    align-items: center;
  justify-content: center;
animation: fadeEffect 0.6s ease;
}

@keyframes fadeEffect {
    from { opacity: 0.5;}
    to { opacity: 1;}
}

.mySlides img {
  width: 100%;
  height: 300px;
  object-fit: contain;
  border: none;
  border-radius: 10px;
  background: #000;
}

.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  
  padding: 15px;
  color: white;
  font-weight: bold;
  font-size: 15px;
}

.next {
  right: 0;
}


/* Repository Limits / Error */
#err{
    display: none;
    position: absolute;
    top:0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    z-index: 10;
    padding-top: 10px;
    text-align: center;
}

/* Dialog */
#app-dialog {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.dialog-content {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 320px;
}

body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

.toolbar {
    flex-shrink: 0;
    display: flex;
    gap: 5px;
    padding: 5px;
}

main {
    flex-grow: 1;
    overflow-y: auto;
}
</style>
</head>

<div class="toolbar">
    <select id="mode-select">
        <option value="all">All</option>
        <option value="html">HTML</option>
        <option value="js">JS</option>
        <option value="node">NodeJS</option>
        <option value="theme">Theme</option>
    </select>
    <input type="search" id="search-input" style="flex-grow:1;">
    <button id="search-btn" onclick="update()">Search</button>
</div>

<main>

<div id="err">
    </div>

<section>
<h2 id="title-popular">Popular</h2>

<div class="slideshow-container">
    <div id="slides-wrapper"></div>

    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>
</div>
</section>

<section>
<h2><span id="title-list">List</span> <button id="btn-copy-meta" onclick="copyMeta()">Copy meta</button><button id="btn-custom-repo" onclick="customRepo()"></button></h2>
<div id="apps-list"></div>
</section>

</main>

<div id="app-dialog">
    <div class="dialog-content" id="dialog-content"></div>

function getRepoUrl(metaUrl) {
    try {
        const url = new URL(metaUrl);
        const parts = url.pathname.split("/");
        parts.pop(); 
        return url.origin + parts.join("/") + "/";
    } catch(e) {
        return "";
    }
}

const currentStrings = translations[lang] || translations.en;

// Функція локалізації статичних HTML елементів
function applyDOMTranslations() {
    document.getElementById("mode-select").options[0].text = currentStrings.all;
    document.getElementById("search-input").placeholder = currentStrings.searchPlaceholder;
    document.getElementById("search-btn").innerText = currentStrings.search;
    document.getElementById("title-popular").innerText = currentStrings.popular;
    document.getElementById("title-list").innerText = currentStrings.list;
    document.getElementById("btn-copy-meta").innerText = currentStrings.copyMeta;
    document.getElementById("btn-custom-repo").innerText = currentStrings.connectCustom;
}

function showNoInternetUI() {
    err.innerHTML = `
        <h2>${currentStrings.repoUnavailable}</h2>
        ${currentStrings.noInternet}
        <br><br>
        <b>${currentStrings.whatToDo}</b>
        <ul>
            <li>${currentStrings.checkInternet}</li>
            <li>${currentStrings.browseLocal}</li>
        </ul>
        <button onclick="start()">${currentStrings.retry}</button>
        <br>
    `;
    err.style.display = "block";
}

function showTrafficLimitUI() {
    err.innerHTML = `
        <h2>${currentStrings.repoUnavailable}</h2>
        ${currentStrings.limitReached}<br>
        ${currentStrings.resumeCycle}
        <br><br>
        <b>${currentStrings.whatToDo}</b>
        <ul>
            <li>${currentStrings.waitNext}</li>
            <li>${currentStrings.connectCustom}</li>
        </ul>
        <br>
        <b>${currentStrings.tipTitle}</b><br>
        ${currentStrings.tipDesc}
        <br>
        <button onclick="customRepo()">${currentStrings.connectCustom}</button>
    `;
    err.style.display = "block";
}

function customRepo() {
    err.innerHTML = `
        <h2>${currentStrings.connectCustom}</h2>
        <input id="meta" placeholder="${currentStrings.placeholderMeta}"><br><br>
        <button onclick="connect()">${currentStrings.connectBtn}</button>
        <p id="status"></p>
    `;
    err.style.display = "block";
}



async function connect() {
    const metaInput = document.getElementById("meta");
    const status = document.getElementById("status");
    const meta = metaInput.value.trim();
    const repo = getRepoUrl(meta);
    
    if (!repo || !meta) {
        status.innerText = currentStrings.fillFields;
        return;
    }
    
    try {
        BASE_URL = repo;
        META_URL = meta;
        status.innerText = currentStrings.connectedSuccess;
        const note = await start();
        status.innerText = note;
        localStorage.setItem("StoreRepo", meta);
    } catch (e) {
        status.innerText = currentStrings.connectFailed;
        parent.console.error(e.message);
    }
}

const start = async () => {
    let ret;
    applyDOMTranslations();
    
    if (!navigator.onLine){
        showNoInternetUI();
        return "Offline";
    }
    try {
        const response = await fetch(META_URL);
        
        if (!response.ok) {
            if (response.status === 429 || response.status === 509) { // Трафік / Ліміти
                showTrafficLimitUI();
                return "Limit reached";
            }
            throw new Error("HTTP " + response.status);
        }
        
        apps = await response.json();
        
        if (!Array.isArray(apps)) {
            ret = "Invalid meta format";
            parent.console.error(ret);
        }
        
        update();
        ret = "Found: " + apps.length;
        parent?.console.log?.("Found: " + apps.length);
        err.style.display = "none";
        
    } catch (e) {
        console.error("Store load failed:", e);
        ret = "Store load failed:" + e;
        showTrafficLimitUI(); // Повертаємо вікно кастомного репо у разі падіння хоста
    }
    return ret;
}

// Ініціалізація
start();

const appsContainer = document.getElementById("apps-list");
const slidesWrapper = document.getElementById("slides-wrapper");
const dialog = document.getElementById("app-dialog");
const dialogContent = document.getElementById("dialog-content");
const currentOS = parent.getDevProps().os.version;

function formatVersion(rawDate) {
    const day = rawDate.slice(0, 2);
    const month = rawDate.slice(2, 4);
    const year = rawDate.slice(4, 8);
    return `${year}${month}${day}`;
}

function isCompatible(app) {
    return formatVersion(currentOS) >= formatVersion(app.minOS);
}

/* Cards */
function createCard(app) {
    const card = document.createElement("div");
    card.className = "app-card";

    card.innerHTML = `
        <p style="white-space: nowrap; font-weight: bold; font-size: 20px;">${app.name || ""}</p>
        <small>${app.developer || ""}</small>
        <br>
        <button class="inst">${currentStrings.install}</button>
    `;
    
    if (!isCompatible(app)){
        card.querySelector("button").disabled = true;
    }
    card.onclick = () => openDialog(app);

    card.querySelector("button").onclick = (e) => {
        e.stopPropagation();
        install(app.name);
    };

    return card;
}

function renderApps(list) {
    appsContainer.innerHTML = "";
    try {
        list.forEach(app => appsContainer.appendChild(createCard(app)));
    } catch(e) {}
}

/* Carousel */
function renderCarousel(list) {
    slidesWrapper.innerHTML = "";

    list.forEach(app => {
        const slide = document.createElement("div");
        slide.className = "mySlides";

        slide.innerHTML = `
            <img alt="${app.name || ""}" title="${app.name || ""}" src="${(app.banner.includes("://") ? app.banner : BASE_URL+app.banner) || ""}">
        `;

        slide.onclick = () => openDialog(app);
        slidesWrapper.appendChild(slide);
    });

    slideIndex = 1;
    showSlides(slideIndex);
}

/* Dialog */
function openDialog(app) {
    dialog.style.display = "flex";

    dialogContent.innerHTML = `
        <h2 style="user-select: text;">${app.name || ""}</h2>
        <small>${app.developer || ""}</small>
        <p style="user-select: text;">${app.desc || ""}</p>
        <button class="inst">${currentStrings.install}</button>
        <hr>
        <p><b>${currentStrings.tester}:</b> ${app.tester || ""}</p>
        <p><b>${currentStrings.minOS}:</b> ${app.minOS || "00000000"}</p>
    `;
    
    if (app.deps != null){
        dialogContent.innerHTML += `
        <p><b>${currentStrings.deps}:</b> ${app.deps.join(", ")}</p>
        `;
    }
    
    if (!isCompatible(app)){
        dialogContent.querySelector("button").disabled = true;
    }

    dialogContent.querySelector("button").onclick = (e) => {
        e.stopPropagation();
        install(app.name);
    };
}

dialog.onclick = (e) => {
    if (e.target === dialog) dialog.style.display = "none";
};

/* Filters */
const modeSelect = document.getElementById("mode-select");
const searchInput = document.getElementById("search-input");

function filterApps() {
    const mode = modeSelect.value;
    const query = searchInput.value.toLowerCase();
    let a;
    try {
         a = apps.filter(app =>
            (mode === "all" || app.type === mode) &&
            app.name.toLowerCase().includes(query)
        );
    } catch(e) {
        modeSelect.disabled = 1;
        a = apps;
    }
    return a;
}

async function install(name) {
    const app = apps.find(a => a.name === name);
    if (!app) {
        parent.console.error("App not found in registry: " + name);
        return 0;
    }

    const url = BASE_URL + app.entry;
    parent.console.log("Downloading from: " + url);

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP error " + res.status);

        const blob = await res.blob();
        if (!blob) throw new Error("No BLOB provided.");

        const file = new File([blob], `tmp_${Date.now()}.zip`, {
            type: blob.type || "application/zip"
        });

        await parent.unzipFile(file, "");

        if (app.deps && app.deps.length > 0) {
            await parent.npmUpdate();
            for (const pkg of app.deps) {
                await parent.npmInstall(pkg);
            }
        }

        if (app.type === "js") {
            const fileName = app.entry.split("/").pop().split(".")[0].toLowerCase() + '.js';
            const fileExists = parent.getFs().find(f => f.name == fileName);
            if (fileExists) {
                let autoload = [];
                const autoloadString = localStorage.getItem('infinity_os_autoload');
                
                if (autoloadString) {
                    try {
                        autoload = JSON.parse(autoloadString);
                    } catch (e) {
                        console.error("Autoload parse error:", e);
                        autoload = [];
                    }
                }

                if (!autoload.includes(fileName)) {
                    autoload.push(fileName);
                    localStorage.setItem('infinity_os_autoload', JSON.stringify(autoload));
                }
            }
        }

        parent.alert(currentStrings.alertSuccess + app.name);
        return 1;

    } catch (e) {
        parent.console.error(`Installation failed for ${name}: ${e.message}`);
        return 0;
    }
}

function update() {
    const filtered = filterApps();
    renderApps(filtered);
    try {
        renderCarousel(filtered.filter(a => a.banner != ""));
    } catch(e) {}
}

modeSelect.onchange = update;
searchInput.oninput = update;

/* Slideshow */
let slideIndex = 1;

function plusSlides(n) {
    showSlides(slideIndex += n);
}

function showSlides(n) {
    const slides = document.getElementsByClassName("mySlides");
    if (!slides.length) return;
    
    if (n > slides.length) slideIndex = 1;
    if (n < 1) slideIndex = slides.length;

    for (let s of slides) {
        s.style.display = "none";
    }
    slides[slideIndex - 1].style.display = "block";
}

setInterval(() => plusSlides(1), 4000);

window.onerror = (e) => {
    parent.console.error(e.message);
}

async function copyMeta(){
    await navigator.clipboard.writeText(JSON.stringify(apps));
    parent.alert(currentStrings.alertCopied);
}

document.addEventListener('keydown', async (event) => {
    if (event.key === 'F12') {
        event.preventDefault();
        await copyMeta();
    }
});
