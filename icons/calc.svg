<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Paper background (square) -->
  <rect x="8" y="8" width="48" height="48" rx="6"
        fill="#ffffff" stroke="#c7c7cc" stroke-width="2"/>

  <!-- Plus -->
  <rect x="18" y="18" width="12" height="12" rx="2"
        fill="#000000" stroke="#c7c7cc" stroke-width="1"/>
  <path d="M24 20v8M20 24h8"
        stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Minus -->
  <rect x="34" y="18" width="12" height="12" rx="2"
        fill="#000000" stroke="#c7c7cc" stroke-width="1"/>
  <path d="M38 24h4"
        stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Multiply -->
  <rect x="18" y="34" width="12" height="12" rx="2"
        fill="#000000" stroke="#c7c7cc" stroke-width="1"/>
  <path d="M20.5 36.5l7 7M27.5 36.5l-7 7"
        stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Equals (bigger) -->
  <rect x="34" y="34" width="12" height="12" rx="2"
        fill="#000000" stroke="#c7c7cc" stroke-width="1"/>
  <path d="M37 38h6M37 42h6"
        stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>

</svg>