<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect x="5" y="5" width="55" height="55" rx="8" fill="#000"  />

  <!-- Task line (grid-aligned) -->
  <polyline 
    points="5,50 30,30 40,35 55,15"
    fill="none" 
    stroke="#00ff00" 
    stroke-width="2" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Border -->
  <rect 
    x="5" y="5" 
    width="55" height="55" 
    rx="10"
    fill="none"
    stroke="#777"
    stroke-width="3"
  />
</svg>